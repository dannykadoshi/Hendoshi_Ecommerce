<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    .hendoshi-text { fill: #000000; }
    .tagline { fill: #E71F7F; }
    .dog { fill: #E71F7F; }
  </style>
  
  <!-- HENDOSHI Text (simplified metal style) -->
  <text x="400" y="150" font-family="Impact, Arial Black, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" class="hendoshi-text">HENDOSHI</text>
  
  <!-- Tagline -->
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="4" class="tagline">WEAR YOUR WEIRD</text>
  
  <!-- Simplified Dog Icon -->
  <g transform="translate(380, 220)" class="dog">
    <circle cx="20" cy="15" r="18"/>
    <circle cx="8" cy="8" r="6"/>
    <circle cx="32" cy="8" r="6"/>
    <ellipse cx="20" cy="22" rx="6" ry="8"/>
    <rect x="17" y="28" width="6" height="8"/>
  </g>
</svg>
