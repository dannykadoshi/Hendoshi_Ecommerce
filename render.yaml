services:
  - type: web
    name: hendoshi-store
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn hendoshi_store.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hendoshi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.4" 
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: hendoshi-store
          property: host

databases:
  - name: hendoshi-db
    plan: basic-256mb