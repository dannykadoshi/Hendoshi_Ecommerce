{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline — HENDOSHI</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #f0f0f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center;
            padding: 2rem;
        }

        .skull {
            width: 140px;
            height: 140px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 24px rgba(255, 20, 147, 0.6));
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 16px rgba(255, 20, 147, 0.5)); }
            50%       { filter: drop-shadow(0 0 36px rgba(255, 20, 147, 0.9)); }
        }

        .brand {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: #FF1493;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        h1 span {
            color: #CCFF00;
        }

        p {
            font-size: 1rem;
            color: rgba(240, 240, 240, 0.6);
            max-width: 340px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-retry {
            display: inline-block;
            padding: 0.85rem 2.5rem;
            background: #FF1493;
            color: #000;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .btn-retry:hover {
            background: #CCFF00;
            transform: scale(1.04);
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #FF1493, #CCFF00);
            margin: 2.5rem auto;
            border-radius: 2px;
        }

        .tip {
            font-size: 0.8rem;
            color: rgba(240, 240, 240, 0.35);
            letter-spacing: 0.02em;
        }

        /* Pink bottom accent line */
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #FF1493, #CCFF00, #FF1493);
        }
    </style>
</head>
<body>
    <img src="{% static 'images/pug-skull.webp' %}" alt="HENDOSHI Pug Skull" class="skull">
    <div class="brand">HENDOSHI</div>
    <h1>You're <span>Offline</span></h1>
    <p>Looks like your connection dropped. Check your signal and smash retry — the vault awaits.</p>
    <button class="btn-retry" onclick="window.location.reload()">RETRY CONNECTION</button>
    <div class="divider"></div>
    <p class="tip">Your cart and saved items will be right here when you're back.</p>
</body>
</html>
