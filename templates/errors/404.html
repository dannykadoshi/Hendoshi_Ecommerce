{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - HENDOSHI. Return to our metal-inspired apparel store with unique skull, animal, and gym designs.">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found | HENDOSHI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/1-foundation/variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/6-pages/error-pages.css' %}">
</head>
<body class="error-body">
    <div class="error-page">
        <div class="error-inner">

            <span class="error-logo">HENDOSHI</span>

            <div class="error-icon">
                <img src="{% static 'images/pug-skull.webp' %}" alt="Lost Pug Skull" class="pug-skull-404">
            </div>

            <h1 class="error-title">404</h1>
            <h2 class="error-subtitle">Page Not Found</h2>

            <div class="error-divider"></div>

            <p class="error-message">
                This page got lost in the void. Even our pug skull can't find it.<br>
                <strong>But don't worry — there's plenty of weird and wonderful stuff waiting for you!</strong>
            </p>

            <div class="error-actions d-flex justify-content-center gap-3 flex-wrap">
                <a href="{% url 'home' %}" class="error-btn-pink">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="{% url 'products' %}" class="error-btn-yellow">
                    <i class="fas fa-shopping-bag"></i> Shop Now
                </a>
            </div>

            <div class="error-search">
                <p>Looking for something specific?</p>
                <form action="{% url 'products' %}" method="get" class="d-flex">
                    <input type="text" name="q" class="search-input" placeholder="Search products..." maxlength="100" aria-label="Search products">
                    <button type="submit" class="search-btn" aria-label="Search">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>
</body>
</html>
