{% extends 'base.html' %}
{% load static %}

{% block extra_title %}Unsubscribe{% endblock %}

{% block content %}
<div class="container" style="margin-top: 120px; margin-bottom: 60px;">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="profile-card text-center">
                <i class="fas fa-bell-slash fa-3x mb-3" style="color: var(--pink);"></i>
                <h1 style="color: var(--pink);">Notification Settings</h1>
                <p class="text-muted mb-4">Choose what you'd like to unsubscribe from:</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="d-grid gap-3">
                        <button type="submit"
                                name="type"
                                value="sale"
                                class="btn btn-outline-pink btn-lg">
                            <i class="fas fa-tag me-2"></i>
                            Unsubscribe from Sale Alerts
                        </button>

                        <button type="submit"
                                name="type"
                                value="restock"
                                class="btn btn-outline-pink btn-lg">
                            <i class="fas fa-box me-2"></i>
                            Unsubscribe from Restock Alerts
                        </button>

                        <button type="submit"
                                name="type"
                                value="vault"
                                class="btn btn-outline-pink btn-lg">
                            <i class="fas fa-camera me-2"></i>
                            Unsubscribe from Vault Photo Reviews
                        </button>

                        <hr style="border-color: var(--border-color); margin: 16px 0;">

                        <button type="submit"
                                name="type"
                                value="all"
                                class="btn btn-secondary btn-lg">
                            <i class="fas fa-bell-slash me-2"></i>
                            Unsubscribe from All Emails
                        </button>
                    </div>
                </form>

                <div class="mt-4 pt-3" style="border-top: 1px solid var(--border-color);">
                    <p class="text-muted small mb-2">Changed your mind?</p>
                    <a href="{% url 'home' %}" class="btn btn-pink">
                        <i class="fas fa-shopping-bag me-2"></i> Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-outline-pink {
        color: var(--pink);
        border-color: var(--pink);
        background: transparent;
    }

    .btn-outline-pink:hover {
        background: var(--pink);
        color: white;
    }
</style>
{% endblock %}
