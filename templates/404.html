{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - HENDOSHI. Return to our metal-inspired apparel store with unique skull, animal, and gym designs.">
    <meta name="keywords" content="404, page not found, HENDOSHI, metal apparel, alternative fashion">
    <title>404 - Page Not Found | HENDOSHI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    <div class="error-page">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-md-8 text-center">
                    
                    <!-- Pug Skull Icon -->
                    <div class="error-icon mb-4">
                        <img src="{% static 'images/pug-skull.png' %}" alt="Lost Pug" class="pug-skull-404">
                    </div>
                    
                    <!-- 404 Title -->
                    <h1 class="error-title">404</h1>
                    <h2 class="error-subtitle">PAGE NOT FOUND</h2>
                    
                    <!-- Message -->
                    <p class="error-message">
                        This page got lost in the void. Even our pug skull can't find it.
                    </p>
                    
                    <!-- Buttons -->
                    <div class="error-actions">
                        <a href="{% url 'home' %}" class="btn btn-pink btn-lg me-3">
                            <i class="fas fa-home"></i> BACK TO HOME
                        </a>
                        <a href="{% url 'products' %}" class="btn btn-pink btn-lg">
                            <i class="fas fa-shopping-bag"></i> SHOP NOW
                        </a>
                    </div>
                    
                    <!-- Search -->
                    <div class="error-search mt-5">
                        <p class="mb-3">Looking for something specific?</p>
                        <form action="{% url 'products' %}" method="get" class="d-flex justify-content-center">
                            <input type="text" name="q" class="form-control search-input" placeholder="Search products..." maxlength="100">
                            <button type="submit" class="btn btn-pink ms-2">
                                <i class="fas fa-search"></i>
                            </button>
                        </form>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</body>
</html>
