{% extends 'base.html' %}
{% load static %}

{% block extra_title %}Sign Up{% endblock %}

{% block content %}
<div class="container auth-page">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="auth-card">
                <h1 class="auth-title">SIGN UP</h1>
                
                <form method="post" action="{% url 'account_signup' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control auth-form-input" id="id_username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" class="form-control auth-form-input" id="id_email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_email2" class="form-label">Email (again)</label>
                        <input type="email" name="email2" class="form-control auth-form-input" id="id_email2" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password1" class="form-label">Password</label>
                        <input type="password" name="password1" class="form-control auth-form-input" id="id_password1" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password2" class="form-label">Password (again)</label>
                        <input type="password" name="password2" class="form-control auth-form-input" id="id_password2" required>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100 mb-3">SIGN UP</button>
                    
                    <div class="text-center">
                        <p>Already have an account? <a href="{% url 'account_login' %}" class="auth-link">Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
