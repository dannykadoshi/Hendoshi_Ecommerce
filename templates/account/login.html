{% extends 'base.html' %}
{% load static %}

{% block extra_title %}Login{% endblock %}

{% block content %}
<div class="container auth-page">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="auth-card">
                <h1 class="auth-title">LOGIN</h1>
                
                <form method="post" action="{% url 'account_login' %}">
                    {% csrf_token %}

                    {% if form.errors %}
                    <script>
                        document.addEventListener('DOMContentLoaded', function() {
                            showToast('Invalid username/email or password. Please try again.', 'error');
                        });
                    </script>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_login" class="form-label">Username or Email</label>
                        <input type="text" name="login" class="form-control auth-form-input" id="id_login" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control auth-form-input" id="id_password" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="id_remember">
                        <label class="form-check-label" for="id_remember">Remember Me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100 mb-3">LOGIN</button>
                    
                    <div class="text-center">
                        <p>Don't have an account? <a href="{% url 'account_signup' %}" class="auth-link">Sign Up</a></p>
                        <p><a href="{% url 'account_reset_password' %}" class="auth-link">Forgot Password?</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
