{% extends 'base.html' %}
{% load static %}

{% block extra_title %}Sign Out{% endblock %}

{% block content %}
<div class="auth-page">
    <section class="page-hero">
        <div class="container">
            <div class="row">
                <div class="col-12 text-center">
                    <img src="{% static 'images/pug-skull.webp' %}" alt="HENDOSHI Pug Skull" class="pug-skull-branding mb-3" loading="lazy">
                    <h1 class="page-hero-title">Sign Out</h1>
                    <p class="page-hero-subtitle">Come back anytime — we'll be here</p>
                </div>
            </div>
        </div>
    </section>

    <div class="page-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="auth-card text-center logout-card">
                        <div class="auth-icon-wrapper">
                            <i class="fas fa-sign-out-alt"></i>
                        </div>
                        <h2 class="auth-card-title">Leaving so soon?</h2>
                        <p class="auth-message">Are you sure you want to sign out?</p>

                        <form method="post" action="{% url 'account_logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-pink btn-lg w-100 mb-3">
                                <i class="fas fa-check me-2"></i>Yes, Sign Out
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-outline-ghost w-100">
                                <i class="fas fa-arrow-left me-2"></i>Cancel
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
