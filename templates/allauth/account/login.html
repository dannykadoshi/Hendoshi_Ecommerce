{% extends 'base.html' %}
{% load static %}

{% block extra_title %}Login{% endblock %}

{% block content %}
<div class="container py-5" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="auth-card" style="background: var(--charcoal); padding: 3rem; border-radius: 8px;">
                <h1 class="text-center mb-4" style="color: var(--neon-pink);">LOGIN</h1>
                
                <form method="POST" action="{% url 'account_login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_login" class="form-label">Username or Email</label>
                        <input type="text" name="login" class="form-control" id="id_login" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="id_remember">
                        <label class="form-check-label" for="id_remember">Remember Me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100 mb-3">LOGIN</button>
                    
                    <div class="text-center">
                        <p>Don't have an account? <a href="{% url 'account_signup' %}" style="color: var(--neon-pink);">Sign Up</a></p>
                        <p><a href="{% url 'account_reset_password' %}" style="color: var(--neon-pink);">Forgot Password?</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
