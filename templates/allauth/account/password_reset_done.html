{% extends 'base.html' %}
{% load static %}

{% block extra_title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="container py-5" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="auth-card" style="background: var(--charcoal); padding: 3rem; border-radius: 8px; text-align: center;">
                <i class="fas fa-envelope-open-text fa-4x mb-4" style="color: var(--neon-pink);"></i>
                <h1 class="mb-4" style="color: var(--neon-pink);">CHECK YOUR EMAIL</h1>
                
                <p class="mb-4">We've sent you an email with instructions to reset your password.</p>
                
                <p style="color: var(--gray);">If you don't see the email, check your spam folder.</p>
                
                <a href="{% url 'home' %}" class="btn btn-pink mt-3">BACK TO HOME</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
