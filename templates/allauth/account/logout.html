{% extends 'base.html' %}
{% load static %}

{% block extra_title %}Sign Out{% endblock %}

{% block content %}
<div class="container py-5" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="auth-card" style="background: var(--charcoal); padding: 3rem; border-radius: 8px; text-align: center;">
                <i class="fas fa-sign-out-alt fa-4x mb-4" style="color: var(--neon-pink);"></i>
                <h1 class="mb-4" style="color: var(--neon-pink);">SIGN OUT</h1>
                
                <p class="mb-4" style="font-size: 1.1rem;">Are you sure you want to sign out?</p>
                
                <form method="POST" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-pink btn-lg w-100 mb-3">YES, SIGN OUT</button>
                    <a href="{% url 'home' %}" class="btn btn-outline-pink w-100">CANCEL</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
